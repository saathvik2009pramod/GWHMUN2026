<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCC | GWHMUN 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505; /* Slightly offset from pure black to match screenshot */
            --surface-color: #0f0f11; /* Dark grey card color from screenshot */
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #71717a; /* Muted grey for labels */
            --gradient-glow: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6); /* The exact gradient from your screenshot */
            --accent-gold: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Page Transition Animations --- */
        body {
            opacity: 0;
            animation: fadeInPage 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        body.fade-out {
            animation: fadeOutPage 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOutPage {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-15px); }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* --- Glass Navbar --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }
        .nav-content {
            display: flex;
            align-items: center;
        }
        .logo-link {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-right: 40px;
            text-decoration: none;
        }
        .nav-logo {
            height: 50px;
            filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.1));
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .logo-link:hover .logo-text {
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .nav-links {
            flex: 1;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
        }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: capitalize;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        /* --- Committee Specific Styles --- */
        .committee-hero {
            padding-top: 180px;
            padding-bottom: 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
        }
        
        /* Subtle background glow from the screenshot */
        .committee-hero::before {
            content: '';
            position: absolute;
            top: 50%;
            right: 15%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 60%);
            transform: translateY(-50%);
            z-index: -1;
            pointer-events: none;
        }

        .committee-tag {
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 24px;
        }
        
        .committee-hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 40px;
            color: var(--text-main);
        }

        /* Solid Gradient Button matching screenshot */
        .btn-solid {
            display: inline-block;
            padding: 14px 28px;
            background: var(--gradient-glow);
            color: #000000; /* Dark text on gradient */
            font-weight: 800;
            font-size: 0.95rem;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-solid:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3);
        }

        .committee-logo-wrapper {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px; /* Soft rounded corners from screenshot */
            padding: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            min-height: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .committee-logo-wrapper img {
            max-width: 100%;
            height: auto;
            max-height: 250px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 120px;
        }
        
        .info-box {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px; /* Matched from screenshot */
            padding: 24px 30px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .info-box:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
        }
        .info-box h4 {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        .info-box h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* --- Footer --- */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 80px 0;
            text-align: center;
        }
        footer img {
            height: 50px;
            opacity: 0.5;
            margin-bottom: 20px;
            filter: grayscale(100%);
            transition: all 0.3s ease;
        }
        footer img:hover {
            opacity: 1;
            filter: grayscale(0%);
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 900px) {
            .nav-links { display: none; }
            .logo-link { padding-right: 0; }
            .committee-hero { grid-template-columns: 1fr; gap: 40px; padding-top: 140px; }
            .committee-hero h1 { font-size: 3.5rem; }
            .committee-logo-wrapper { min-height: 250px; padding: 40px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo-link">
                <img src="./images/MainLogo.png" alt="GWHMUN Logo" class="nav-logo" onerror="this.style.display='none';">
                <span class="logo-text">GWHMUN</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#committees">Committees</a>
                <a href="resources.html">Resources</a>
                <a href="registrations.html">Registrations</a>
                <a href="index.html#contact">Contact Us</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Committee Header Section -->
        <div class="committee-hero">
            <div>
                <span class="committee-tag">Committee Page</span>
                
                <!-- CHANGE THIS TITLE FOR EACH COMMITTEE -->
                <h1>CCC</h1>
                
                <a href="index.html#committees" class="btn-solid">Back to committees</a>
            </div>
            
            <div class="committee-logo-wrapper">
                <!-- CHANGE THIS IMAGE SOURCE FOR EACH COMMITTEE -->
                <img src="./images/CCC.png" alt="Committee Logo" onerror="this.style.display='none';">
            </div>
        </div>

        <!-- Committee Information Grid -->
        <div class="info-grid">
            <div class="info-box">
                <h4>Agenda</h4>
                <h3>Coming soon</h3>
            </div>
            
            <div class="info-box">
                <h4>Executive Board</h4>
                <h3>Coming soon</h3>
            </div>
            
            <div class="info-box">
                <h4>Background Guide</h4>
                <h3>Coming soon</h3>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <img src="./images/MainLogo.png" alt="GWHMUN Crest" onerror="this.style.display='none';">
            <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;">© 2026 Greenwood High MUN</p>
        </div>
    </footer>

    <!-- Page Transition Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('a[href]');
            links.forEach(link => {
                link.addEventListener('click', (e) => {
                    const targetUrl = link.href;
                    const currentUrl = window.location.href.split('#')[0];
                    const hrefAttribute = link.getAttribute('href');
                    
                    if (link.getAttribute('target') === '_blank' || hrefAttribute.startsWith('mailto:') || targetUrl.split('#')[0] === currentUrl) {
                        return;
                    }
                    
                    e.preventDefault();
                    document.body.classList.add('fade-out');
                    setTimeout(() => { window.location.href = hrefAttribute; }, 400); 
                });
            });
        });
    </script>

</body>
</html>
